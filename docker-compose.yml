services:
  postgres:
    image: postgres:15-alpine
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: mcpuser
      POSTGRES_PASSWORD: mcppassword
      POSTGRES_DB: usuarios_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Ejecutar init.sql primero (estructura)
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # Luego ejecutar seed-usuarios.sql (datos)
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpuser -d usuarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp-network

  mcp-server:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: mcp-server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mcpuser
      DB_PASSWORD: mcppassword
      DB_NAME: usuarios_db
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - mcp-network

volumes:
  postgres_data:

networks:
  mcp-network:
    driver: bridge